<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Nuran — Talk &amp; Learn</title>
  <meta name="description" content="A private, offline-first communication and early literacy app. No accounts, ads, analytics, or tracking.">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Nuran">
  <meta name="theme-color" content="#fff4e6">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="visual-system.css">
</head>
<body>
  <main id="app"></main>
  <div id="status-live" class="sr-only" aria-live="polite" aria-atomic="true"></div>

  <!-- Help alert overlay: offline, on-device, dismissed only by a caregiver hold (spec 6.4) -->
  <div id="help-overlay" role="alertdialog" aria-label="Help requested">
    <h2>Help!</h2>
    <p>Your child pressed the Help button and needs a caregiver right now.</p>
    <button id="help-dismiss" class="gate-btn">Caregiver: press and hold to answer</button>
  </div>

  <div id="modal-wrap" aria-hidden="true"><div id="modal" role="dialog" aria-modal="true" tabindex="-1"></div></div>

  <script src="lucide.js"></script>
  <script src="nuran-real-photos.js"></script>
  <script src="core/symbol-registry.js"></script>
  <script src="core/settings.js"></script>
  <script src="core/curriculum.js"></script>
  <script src="core/activity-registry.js"></script>
  <script src="core/platform.js"></script>
  <script src="features/activity-catalog.js"></script>
  <script src="db.js"></script>
  <script src="speech.js"></script>
  <script src="seed.js"></script>
  <script src="app.js"></script>
</body>
</html>
